name: Bug report
description: Something is broken or doesn't work as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough detail that someone else can reproduce it.

  - type: input
    id: version
    attributes:
      label: Nazar version
      description: Visible in Help → Quick Reference, or `defaults read app.nazar`.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.4.1"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: |
        Describe the actual behavior. Attach a log tail from
        `~/Library/Application Support/Nazar/nazar.log` if relevant.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open dashboard
        2. Select X, Y
        3. Click Clean
        4. ...
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
