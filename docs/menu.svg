<svg xmlns="http://www.w3.org/2000/svg" width="280" height="320" viewBox="0 0 280 320" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif">
  <!-- Menu card -->
  <rect width="280" height="320" rx="8" ry="8" fill="#252525"/>
  <rect width="280" height="320" rx="8" ry="8" fill="none" stroke="#3a3a3c" stroke-width="0.5"/>

  <g font-size="13" fill="#f5f5f7">
    <text x="16" y="34">Dashboard</text>
    <text x="16" y="60">Run Cleanup</text>

    <text x="16" y="86">Profiles</text>
    <text x="258" y="86" fill="#8e8e93" font-size="11" text-anchor="end">▸</text>

    <rect x="16" y="100" width="248" height="0.5" fill="#3a3a3c"/>

    <text x="16" y="124">Settings</text>
    <text x="258" y="124" fill="#8e8e93" font-size="11" text-anchor="end">▸</text>

    <text x="16" y="150">Help</text>
    <text x="258" y="150" fill="#8e8e93" font-size="11" text-anchor="end">▸</text>

    <rect x="16" y="166" width="248" height="0.5" fill="#3a3a3c"/>

    <text x="16" y="190">Quit</text>
    <text x="252" y="190" fill="#8e8e93" font-size="11" text-anchor="end">⌘Q</text>
  </g>

  <!-- Settings submenu preview (popped to the right) -->
  <g transform="translate(0,220)">
    <text x="16" y="0" fill="#6e6e73" font-size="9" font-weight="500" letter-spacing="1.4">SETTINGS ▸</text>
    <g font-size="11" fill="#8e8e93">
      <text x="16" y="22">Profiles &amp; Shortcuts…</text>
      <text x="16" y="42">Startup Apps · 2  ·  Protected · 1</text>
      <text x="16" y="62">Trigger Mode ▸  ·  Auto-download ✓</text>
      <text x="16" y="82">Confirm Before Cleanup ✓</text>
    </g>
  </g>
</svg>
