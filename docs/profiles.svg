<svg xmlns="http://www.w3.org/2000/svg" width="480" height="380" viewBox="0 0 480 380" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif">
  <!-- Background card -->
  <rect width="480" height="380" rx="12" ry="12" fill="#252525"/>
  <rect width="480" height="380" rx="12" ry="12" fill="none" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- App icon -->
  <rect x="216" y="22" width="48" height="48" rx="10" fill="#1e1e1e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="240" y="58" font-size="28" text-anchor="middle">🧿</text>

  <!-- Title -->
  <text x="240" y="100" fill="#f5f5f7" font-size="15" font-weight="600" text-anchor="middle">Profiles</text>

  <!-- ===== Row 1: Full Cleanup (default) ===== -->
  <text x="30" y="146" fill="#f5f5f7" font-size="13" font-weight="500">Full Cleanup</text>
  <text x="150" y="146" fill="#6e6e73" font-size="9" font-weight="600" letter-spacing="1.2">DEFAULT</text>
  <text x="30" y="164" fill="#6e6e73" font-size="11">Close Apps · Disk Cleanup · System Updates · Launch  ⌘ ⌃⌥⌘N</text>

  <!-- Buttons row 1 -->
  <text x="306" y="156" fill="#f5f5f7" font-size="12">Run</text>
  <text x="350" y="156" fill="#f5f5f7" font-size="12">Edit</text>
  <text x="398" y="156" fill="#48484a" font-size="13">✕</text>

  <rect x="20" y="180" width="440" height="0.5" fill="#3a3a3c"/>

  <!-- ===== Row 2: Light Clean ===== -->
  <text x="30" y="206" fill="#f5f5f7" font-size="13" font-weight="500">Light Clean</text>
  <text x="30" y="224" fill="#6e6e73" font-size="11">Disk Cleanup  ⌘ ⌃⌥L</text>

  <text x="306" y="216" fill="#f5f5f7" font-size="12">Run</text>
  <text x="350" y="216" fill="#f5f5f7" font-size="12">Edit</text>
  <text x="398" y="216" fill="#f5f5f7" font-size="13">✕</text>

  <rect x="20" y="240" width="440" height="0.5" fill="#3a3a3c"/>

  <!-- ===== Row 3: Empty Trash Only ===== -->
  <text x="30" y="266" fill="#f5f5f7" font-size="13" font-weight="500">Empty Trash Only</text>
  <text x="30" y="284" fill="#6e6e73" font-size="11">Disk Cleanup</text>

  <text x="306" y="276" fill="#f5f5f7" font-size="12">Run</text>
  <text x="350" y="276" fill="#f5f5f7" font-size="12">Edit</text>
  <text x="398" y="276" fill="#f5f5f7" font-size="13">✕</text>

  <rect x="20" y="300" width="440" height="0.5" fill="#3a3a3c"/>

  <!-- ===== Row 4: Just Updates ===== -->
  <text x="30" y="326" fill="#f5f5f7" font-size="13" font-weight="500">Just Updates</text>
  <text x="30" y="344" fill="#6e6e73" font-size="11">System Updates</text>

  <text x="306" y="336" fill="#f5f5f7" font-size="12">Run</text>
  <text x="350" y="336" fill="#f5f5f7" font-size="12">Edit</text>
  <text x="398" y="336" fill="#f5f5f7" font-size="13">✕</text>
</svg>
