<svg xmlns="http://www.w3.org/2000/svg" width="420" height="580" viewBox="0 0 420 580" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif">
  <!-- Background -->
  <rect width="420" height="580" rx="12" ry="12" fill="#1e1e1e"/>

  <!-- Header -->
  <text x="20" y="32" fill="#f5f5f7" font-size="15" font-weight="600" letter-spacing="0.5">Nazar</text>
  <text x="400" y="32" fill="#8e8e93" font-size="10" font-weight="500" letter-spacing="1.2" text-anchor="end">IDLE</text>
  <rect x="0" y="50" width="420" height="0.5" fill="#3a3a3c"/>

  <!-- ===== DISK ===== -->
  <text x="20" y="82" fill="#8e8e93" font-size="9" font-weight="500" letter-spacing="1.4">DISK</text>

  <text x="20" y="118" fill="#f5f5f7" font-size="22" font-family="ui-monospace, 'SF Mono', Menlo, monospace">256,0 GB</text>
  <text x="142" y="118" fill="#8e8e93" font-size="13">/ 244,0 GB free</text>
  <text x="400" y="118" fill="#8e8e93" font-size="13" font-weight="500" font-family="ui-monospace, 'SF Mono', Menlo, monospace" text-anchor="end">51%</text>

  <!-- Disk bar -->
  <rect x="20" y="132" width="380" height="3" fill="#2c2c2e"/>
  <rect x="20" y="132" width="194" height="3" fill="#8a8a8e"/>

  <!-- Items list group -->
  <g font-size="13" fill="#f5f5f7">
    <!-- Row 1: User Caches -->
    <rect x="20" y="158" width="13" height="13" rx="2" fill="none" stroke="#48484a" stroke-width="1"/>
    <text x="46" y="170">User Caches</text>
    <text x="400" y="170" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">320,4 MB</text>
    <rect x="20" y="186" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Row 2: System Logs -->
    <rect x="20" y="194" width="13" height="13" rx="2" fill="none" stroke="#48484a" stroke-width="1"/>
    <text x="46" y="206">System Logs</text>
    <text x="400" y="206" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">238,5 MB</text>
    <rect x="20" y="222" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Row 3: Trash (checked) -->
    <rect x="20" y="230" width="13" height="13" rx="2" fill="#0a84ff" stroke="#0a84ff"/>
    <path d="M23 236 L26 239 L31 232" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="242">Trash</text>
    <text x="400" y="242" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">124,8 MB</text>
    <rect x="20" y="258" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Row 4: Downloads -->
    <rect x="20" y="266" width="13" height="13" rx="2" fill="none" stroke="#48484a" stroke-width="1"/>
    <text x="46" y="278">Downloads (older than 30 days)</text>
    <text x="295" y="278" fill="#8e8e93" font-size="11">⋯</text>
    <text x="400" y="278" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">1,2 GB</text>
    <rect x="20" y="294" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Row 5: Xcode Derived -->
    <rect x="20" y="302" width="13" height="13" rx="2" fill="#0a84ff" stroke="#0a84ff"/>
    <path d="M23 308 L26 311 L31 304" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="314">Xcode Derived Data</text>
    <text x="400" y="314" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">4,6 GB</text>
    <rect x="20" y="330" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Row 6: Temp -->
    <rect x="20" y="338" width="13" height="13" rx="2" fill="none" stroke="#48484a" stroke-width="1"/>
    <text x="46" y="350">Temporary Files</text>
    <text x="400" y="350" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">18,2 MB</text>
  </g>

  <!-- Buttons -->
  <rect x="20" y="376" width="183" height="28" rx="6" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="112" y="394" fill="#f5f5f7" font-size="12" text-anchor="middle">Add Folder</text>

  <rect x="217" y="376" width="183" height="28" rx="6" fill="#0a84ff"/>
  <text x="309" y="394" fill="#fff" font-size="12" font-weight="500" text-anchor="middle">Clean</text>

  <!-- ===== RUNNING ===== -->
  <text x="20" y="436" fill="#8e8e93" font-size="9" font-weight="500" letter-spacing="1.4">RUNNING</text>
  <text x="400" y="436" fill="#8e8e93" font-size="9" font-weight="500" font-family="ui-monospace, 'SF Mono', Menlo, monospace" text-anchor="end">4</text>

  <g font-size="13" fill="#f5f5f7">
    <!-- Calendar -->
    <rect x="20" y="452" width="18" height="18" rx="4" fill="#ff453a"/>
    <text x="29" y="465" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">31</text>
    <text x="48" y="465">Calendar</text>
    <text x="400" y="465" fill="#5e5e63" font-size="10" text-anchor="end">✕</text>
    <rect x="20" y="478" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Notes -->
    <rect x="20" y="486" width="18" height="18" rx="4" fill="#ffd60a"/>
    <text x="48" y="499">Notes</text>
    <text x="400" y="499" fill="#5e5e63" font-size="10" text-anchor="end">✕</text>
    <rect x="20" y="512" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Safari -->
    <circle cx="29" cy="529" r="9" fill="#0a84ff"/>
    <circle cx="29" cy="529" r="6" fill="none" stroke="#fff" stroke-width="1"/>
    <text x="48" y="533">Safari</text>
    <text x="400" y="533" fill="#5e5e63" font-size="10" text-anchor="end">✕</text>
  </g>
</svg>
