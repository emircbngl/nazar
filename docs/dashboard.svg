<svg xmlns="http://www.w3.org/2000/svg" width="420" height="780" viewBox="0 0 420 780" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif">
  <!-- Background -->
  <rect width="420" height="780" rx="12" ry="12" fill="#1e1e1e"/>

  <!-- Header -->
  <text x="20" y="32" fill="#f5f5f7" font-size="15" font-weight="600" letter-spacing="0.5">Nazar</text>
  <text x="400" y="32" fill="#8e8e93" font-size="10" font-weight="500" letter-spacing="1.4" text-anchor="end">IDLE</text>
  <rect x="0" y="50" width="420" height="0.5" fill="#3a3a3c"/>

  <!-- ===== DISK ===== -->
  <text x="20" y="82" fill="#8e8e93" font-size="9" font-weight="500" letter-spacing="1.4">DISK</text>

  <text x="20" y="118" fill="#f5f5f7" font-size="22" font-family="ui-monospace, 'SF Mono', Menlo, monospace">372,8 GB</text>
  <text x="146" y="118" fill="#8e8e93" font-size="13">/ 127,2 GB free</text>
  <text x="400" y="118" fill="#f5f5f7" font-size="13" font-weight="500" font-family="ui-monospace, 'SF Mono', Menlo, monospace" text-anchor="end">75%</text>

  <!-- Disk bar (75% = 285/380) -->
  <rect x="20" y="132" width="380" height="4" rx="2" fill="#2c2c2e"/>
  <rect x="20" y="132" width="285" height="4" rx="2" fill="#a8a8ac"/>

  <!-- Items list -->
  <g font-size="13" fill="#f5f5f7">
    <rect x="20" y="160" width="13" height="13" rx="2" fill="none" stroke="#48484a" stroke-width="1"/>
    <text x="46" y="172">User Caches</text>
    <text x="400" y="172" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">412,7 MB</text>
    <rect x="20" y="188" width="380" height="0.5" fill="#2c2c2e"/>

    <rect x="20" y="196" width="13" height="13" rx="2" fill="#0a84ff" stroke="#0a84ff"/>
    <path d="M23 202 L26 205 L31 198" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="208">System Logs</text>
    <text x="400" y="208" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">218,9 MB</text>
    <rect x="20" y="224" width="380" height="0.5" fill="#2c2c2e"/>

    <rect x="20" y="232" width="13" height="13" rx="2" fill="#0a84ff" stroke="#0a84ff"/>
    <path d="M23 238 L26 241 L31 234" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="244">Trash</text>
    <text x="400" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">1,4 GB</text>
    <rect x="20" y="260" width="380" height="0.5" fill="#2c2c2e"/>

    <rect x="20" y="268" width="13" height="13" rx="2" fill="none" stroke="#48484a" stroke-width="1"/>
    <text x="46" y="280">Downloads (older than 30 days)</text>
    <text x="297" y="280" fill="#8e8e93" font-size="11">⋯</text>
    <text x="400" y="280" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">2,8 GB</text>
    <rect x="20" y="296" width="380" height="0.5" fill="#2c2c2e"/>

    <rect x="20" y="304" width="13" height="13" rx="2" fill="#0a84ff" stroke="#0a84ff"/>
    <path d="M23 310 L26 313 L31 306" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="316">Xcode Derived Data</text>
    <text x="400" y="316" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">6,1 GB</text>
    <rect x="20" y="332" width="380" height="0.5" fill="#2c2c2e"/>

    <rect x="20" y="340" width="13" height="13" rx="2" fill="none" stroke="#48484a" stroke-width="1"/>
    <text x="46" y="352">Temporary Files</text>
    <text x="400" y="352" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#8e8e93" text-anchor="end">38,5 MB</text>
  </g>

  <!-- Buttons row -->
  <rect x="20" y="380" width="183" height="28" rx="6" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="111" y="398" fill="#f5f5f7" font-size="12" text-anchor="middle">Add Folder</text>

  <rect x="217" y="380" width="183" height="28" rx="6" fill="#0a84ff"/>
  <text x="308" y="398" fill="#fff" font-size="12" font-weight="500" text-anchor="middle">Clean</text>

  <text x="20" y="426" fill="#8e8e93" font-size="11">Removes caches, logs, and temporary files.</text>

  <!-- ===== RUNNING ===== -->
  <text x="20" y="464" fill="#8e8e93" font-size="9" font-weight="500" letter-spacing="1.4">RUNNING</text>
  <text x="400" y="464" fill="#8e8e93" font-size="9" font-weight="500" font-family="ui-monospace, 'SF Mono', Menlo, monospace" text-anchor="end">4</text>

  <g font-size="13" fill="#f5f5f7">
    <!-- Calendar -->
    <rect x="20" y="480" width="18" height="18" rx="4" fill="#ff453a"/>
    <text x="29" y="493" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">31</text>
    <text x="48" y="493">Calendar</text>
    <text x="398" y="493" fill="#5e5e63" font-size="11" text-anchor="end">✕</text>
    <rect x="20" y="506" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Notes -->
    <rect x="20" y="514" width="18" height="18" rx="4" fill="#ffd60a"/>
    <text x="48" y="527">Notes</text>
    <text x="398" y="527" fill="#5e5e63" font-size="11" text-anchor="end">✕</text>
    <rect x="20" y="540" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Safari -->
    <circle cx="29" cy="557" r="9" fill="#0a84ff"/>
    <circle cx="29" cy="557" r="6" fill="none" stroke="#fff" stroke-width="1"/>
    <text x="48" y="561">Safari</text>
    <text x="398" y="561" fill="#5e5e63" font-size="11" text-anchor="end">✕</text>
    <rect x="20" y="574" width="380" height="0.5" fill="#2c2c2e"/>

    <!-- Music -->
    <rect x="20" y="582" width="18" height="18" rx="4" fill="#ff2d55"/>
    <path d="M27 587 L27 596 M27 587 L34 585 L34 594" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="48" y="595">Music</text>
    <text x="398" y="595" fill="#5e5e63" font-size="11" text-anchor="end">✕</text>
  </g>

  <!-- Close All button -->
  <rect x="20" y="616" width="380" height="28" rx="6" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="210" y="634" fill="#ff453a" font-size="12" text-anchor="middle">Close All</text>

  <!-- ===== UPDATES ===== -->
  <text x="20" y="676" fill="#8e8e93" font-size="9" font-weight="500" letter-spacing="1.4">UPDATES</text>

  <text x="20" y="704" fill="#8e8e93" font-size="13">Up to date</text>

  <!-- Check for Updates button -->
  <rect x="20" y="724" width="380" height="28" rx="6" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="210" y="742" fill="#f5f5f7" font-size="12" text-anchor="middle">Check for Updates</text>
</svg>
